services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: veltrix
      POSTGRES_USER: veltrix
      POSTGRES_PASSWORD: veltrix
    ports:
      - "5432:5432"
    volumes:
      - veltrix_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - veltrix_qdrant:/qdrant/storage

volumes:
  veltrix_postgres:
  veltrix_qdrant:

